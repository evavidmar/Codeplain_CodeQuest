      (walk×3 / type×2 / read×2 by down/up/right). Used as the first
      diverse-palette pick by `pickDiversePalette()`. Additional agents
      beyond six reuse this palette with a random hue shift (45°–315°)
      applied at runtime via `adjustSprite()`.

