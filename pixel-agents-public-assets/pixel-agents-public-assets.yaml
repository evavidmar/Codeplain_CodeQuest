# =============================================================================
# Walls — auto-tiled wall set
# =============================================================================
  - path: assets/walls/wall_0.png
    type: image/png
    bytes: 1738
    dimensions: 64x128
    purpose: Wall auto-tile sheet (4×4 grid of 16×32 pieces).
    description: |
      Wall spritesheet packed as 4 columns × 4 rows of 16×32 pieces, one
      per 4-bit neighbour bitmask (`N=1, E=2, S=4, W=8`). Each piece is
      16 px wide × 32 px tall — the bottom 16 px sits on the tile, and the
      top 16 px extends upward as the wall's 3-D face. The renderer
      computes the appropriate bitmask at draw time
      (`webview-ui/src/office/wallTiles.ts`) and emits the matching slice.
      Walls are colorizable via the editor's HSBC sliders (Colorize mode)
      and the chosen color is stored per-cell in the layout's `tileColors`.
      Source generator: `scripts/generate-walls.js`; visual editor:
      `scripts/wall-tile-editor.html`.

# =============================================================================
# Furniture — one directory per asset (`<ID>/<ID>.png` + `manifest.json`)
# =============================================================================
# Every furniture asset is a directory whose name matches the asset ID. The
# directory contains:
#   - one or more `<VARIANT>.png` sprites (variants are orientations or
#     animation/state frames, e.g. `*_FRONT`, `*_BACK`, `*_SIDE`,
#     `*_ON_1`, `*_OFF`).
#   - a `manifest.json` describing the asset and its members.
#
# Manifest fields:
#   - `id`               — asset ID (matches directory name and PNG basename)
#   - `name`             — human-readable label shown in the editor palette
#   - `category`         — one of: desks, chairs, storage, electronics,
#                          decor, wall, misc (drives the editor tab)
#   - `type`             — `"asset"` (single sprite) or `"group"`
#                          (multiple members)
#   - `groupType`        — for groups: `"rotation"` (orientations) or
#                          `"state"` (on/off) or `"animation"` (frames)
#   - `rotationScheme`   — `"2-way"` (front/side) or `"3-way-mirror"`
#                          (front/back/side, where `side` is mirrored at
#                          runtime to produce the opposite direction)
#   - `canPlaceOnWalls`  — true → snaps onto wall tiles only
#   - `canPlaceOnSurfaces` — true → may be placed on top of desk furniture
#   - `backgroundTiles`  — top N footprint rows that other furniture /
#                          characters may overlap (used for back portions
#                          of tall items like plants and large desks)
#   - `width`/`height`   — sprite pixel size
#   - `footprintW`/`footprintH` — tiles occupied on the grid (16 px each)
#   - `members[]`        — for groups: nested asset/group entries with
#                          `orientation` (`front|back|side`), `state`
#                          (`on|off`), `frame` (animation index), and an
#                          optional `mirrorSide: true` flag.
# -----------------------------------------------------------------------------

