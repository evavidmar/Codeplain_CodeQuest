# Pixel Agents — webview-ui/public Asset Catalog
#
# Consolidated inventory of every file under `webview-ui/public/` in the
# pablodelucca/pixel-agents repository. All `path` values are RELATIVE to
# `webview-ui/public/`. Documentation gathered from on-disk inspection
# (file sizes, image dimensions), the per-furniture `manifest.json` files,
# the `default-layout-1.json` bundled layout, and the project's CLAUDE.md.

source_repo: https://github.com/pablodelucca/pixel-agents
root: webview-ui/public/

# -----------------------------------------------------------------------------
# Notes on how these assets are consumed
# -----------------------------------------------------------------------------
notes:
  pipeline: |
    `esbuild.js` copies `webview-ui/public/assets/` into `dist/assets/` at
    build time. The extension's `assetLoader.ts` then parses the PNGs with
    `pngjs`, converts them into `SpriteData` (a 2D hex array where alpha ≥ 2
    is treated as visible), and pushes the resulting catalog to the React
    webview via `postMessage` (`characterSpritesLoaded` →
    `floorTilesLoaded` → `wallTilesLoaded` → `furnitureAssetsLoaded` →
    `layoutLoaded`).
  tile_size: 16  # px — the canonical grid cell size used throughout the engine
  rendering: |
    All sprites are authored as pixel art at native resolution and scaled by
    integer device-pixels-per-sprite-pixel at draw time (no `ctx.scale(dpr)`).
    Furniture sprites are bottom-aligned to their footprint; sprites taller
    than `footprintH * 16` extend upward (used for things like chair backs
    and wall art).
  color_pipeline: |
    Floor tiles are authored in grayscale and tinted at runtime via the
    Photoshop-style "Colorize" path in `colorize.ts` (HSL + brightness +
    contrast). Furniture and character hue-shifts use the "Adjust" path of
    the same module, which rotates the original pixel HSL instead.

