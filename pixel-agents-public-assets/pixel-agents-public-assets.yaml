# =============================================================================
# Bundled default layout
# =============================================================================
  - path: assets/default-layout-1.json
    type: application/json
    bytes: 14425
    purpose: |
      Bundled fallback office layout loaded when no user-level layout exists
      at `~/.pixel-agents/layout.json` and no legacy workspace state is
      available to migrate.
    description: |
      Serialized `OfficeLayout` for the starter office. Fields:
        - `version: 1`             — layout schema version
        - `cols: 21`, `rows: 22`   — grid dimensions (within the
                                     `MAX_COLS`/`MAX_ROWS` = 64×64 cap)
        - `layoutRevision: 1`      — bump used by migrations
        - `tiles: number[]`        — row-major array of TileType IDs
                                     (e.g. 255 = VOID, 0 = wall, 1/7/9 =
                                     floor pattern indices)
        - `tileColors: (object|null)[]`
                                   — per-tile HSBC colorize parameters
                                     `{h, s, b, c}` aligned 1:1 with `tiles`;
                                     `null` for untinted/VOID cells
        - `furniture: PlacedFurniture[]`
                                   — array of placed items, each with
                                     `{uid, type, col, row}` where `type`
                                     references an asset id from
                                     `assets/furniture/<ID>/manifest.json`
                                     (variant orientation appended with
                                     `:left` for mirrored side sprites).
      The included layout reproduces the office seen in `Screenshot.jpg`:
      a hardwood work area (desks + PCs + wooden chairs + bookshelves +
      hanging plants + clock) on the left, and a carpeted lounge with sofas,
      a coffee table, plants and a painting on the right.
    consumers:
      - src/assetLoader.ts (`loadDefaultLayout()`)
      - src/layoutPersistence.ts (`migrateAndLoadLayout()` fallback path)

# =============================================================================
# Characters — 6 pre-colored player sprites
# =============================================================================
# Each PNG is a full character spritesheet at 112×96 px:
#   - 7 frames horizontally × 16 px wide  = 112 px
#   - 3 direction rows vertically × 32 px = 96 px (24 px sprite,
#                                                   8 px top padding)
# Row order:    0 = down-facing, 1 = up-facing, 2 = right-facing
# Frame order:  walk1, walk2, walk3, type1, type2, read1, read2
# Left-facing is produced at runtime by horizontally flipping the right row.
# No dedicated idle frame — the idle pose reuses walk2.
# Generated by `scripts/export-characters.ts`, which bakes the
# `CHARACTER_PALETTES` colors into the shared template.
# -----------------------------------------------------------------------------

